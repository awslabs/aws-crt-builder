name: 'Check ABI Compliance'
description: 'Dump and compare the ABI of a C shared library between the PR head and its base ref, and label the PR patch/minor'

inputs:
  lib-name:
    description: 'Library name (e.g. aws-c-s3). Determines the .so filename (libaws-c-s3.so).'
    required: true
  builder-version:
    description: 'Builder version/channel used to build the library and its dependencies. Also the tag of the ABI docker image.'
    required: false
    default: 'v0.9.93'
  builder-source:
    description: 'Builder artifact source prefix (releases for tagged versions, channels for branch builds).'
    required: false
    default: 'releases'
  builder-host:
    description: 'Builder artifact host URL.'
    required: false
    default: 'https://d19elf31gohf1l.cloudfront.net'
  image-registry:
    description: 'ECR registry hosting the aws-crt-ubuntu-22-abi-x64 image.'
    required: false
    default: '123124136734.dkr.ecr.us-east-1.amazonaws.com'
  image-name:
    description: 'ABI docker image name (baked with the abi-compliance-checker toolchain).'
    required: false
    default: 'aws-crt-ubuntu-22-abi-x64'
  github-token:
    description: 'Token used to label the PR. Needs pull-requests: write. Defaults to the job token.'
    required: false
    default: ${{ github.token }}
  patch-label:
    description: 'Label applied when the ABI is backward-compatible.'
    required: false
    default: 'patch'
  minor-label:
    description: 'Label applied when the ABI changed (an incompatible but valid, semver-minor, change).'
    required: false
    default: 'minor'
  needs-review-label:
    description: 'Label applied when source (API) compatibility is broken -- callers fail to recompile. Always applied regardless of the binary-compatibility result, since a compile break is never just a routine minor bump.'
    required: false
    default: 'needs-review'
  base-ref:
    description: 'Explicit base ref to diff against (e.g. a previous release tag), overriding the PR base ref. Set this only from a non-PR caller (e.g. a release workflow comparing "previous tag vs current ref"); PR workflows must leave this empty so the PR base ref is used and the PR gets labeled.'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    # The ABI toolchain (abi-compliance-checker, abi-dumper, ctags, cmake) is
    # baked into the aws-crt-ubuntu-22-abi-x64 image, so there is no per-run
    # apt-get install here. The consumer job must have configured AWS creds with
    # ECR pull access (aws-actions/configure-aws-credentials) and checked out
    # with fetch-depth: 0 before invoking this action.
    - name: Pull ABI image
      shell: bash
      env:
        IMAGE_REGISTRY: ${{ inputs.image-registry }}
        IMAGE_NAME: ${{ inputs.image-name }}
        BUILDER_VERSION: ${{ inputs.builder-version }}
      run: |
        aws ecr get-login-password | docker login "$IMAGE_REGISTRY" -u AWS --password-stdin
        DOCKER_IMAGE="${IMAGE_REGISTRY}/${IMAGE_NAME}:${BUILDER_VERSION}"
        docker pull "$DOCKER_IMAGE"
        printf 'ABI_DOCKER_IMAGE=%s\n' "$DOCKER_IMAGE" >> "$GITHUB_ENV"

    - name: Run ABI check in container
      # The container runs build -> dump -> compare -> report -> gate as one
      # process (they chain state through an in-container GITHUB_ENV). The gate
      # exits non-zero ONLY when abi-compliance-checker could not produce a
      # verdict (rc >= 2); a compatible (rc 0) or incompatible (rc 1) ABI both
      # succeed here and are surfaced as a PR label by the next step.
      #
      # The verdict escapes the container via stdout, not a bind-mounted file:
      # `docker run` already streams the container's stdout back to this host
      # process, so gate.sh just prints a marker line ("ABI_LABEL_RESULT::<label>")
      # and we grep it out of the captured output below. A host-mounted file
      # here was solving a problem that doesn't exist -- and it introduced a
      # real one, since a file created by `mktemp` on the host is owned by the
      # runner's UID, and the container (a different UID) can't reliably write
      # to it.
      id: run_check
      shell: bash
      env:
        # printf/env-block (not raw template interpolation) prevents shell and
        # newline injection through the lib-name input.
        LIB_NAME: ${{ inputs.lib-name }}
        BUILDER_VERSION: ${{ inputs.builder-version }}
        BUILDER_SOURCE: ${{ inputs.builder-source }}
        BUILDER_HOST: ${{ inputs.builder-host }}
        ABI_BASE_REF: ${{ inputs.base-ref }}
      run: |
        # Mount the checkout at the same path so GITHUB_WORKSPACE resolves inside
        # the container, and mount the step-summary file so report.py can append
        # the verdict to the host job summary.
        #
        # GITHUB_ACTION_PATH (our own scripts) is mounted :ro -- nothing in the
        # container ever needs to write there, so there's no reason to give a
        # PR's build step write access to the very scripts that gate its label.
        #
        # GITHUB_WORKSPACE (the PR checkout) CANNOT be mounted :ro: build.sh
        # runs `git worktree add` (writes worktree admin state under
        # $GITHUB_WORKSPACE/.git/worktrees/) and the head build writes its
        # build tree directly into $GITHUB_WORKSPACE/build/. Both are required,
        # not incidental, so this mount stays read-write.
        SUMMARY_MOUNT=()
        SUMMARY_ENV=()
        if [[ -n "${GITHUB_STEP_SUMMARY:-}" ]]; then
          SUMMARY_MOUNT=(-v "${GITHUB_STEP_SUMMARY}:${GITHUB_STEP_SUMMARY}")
          SUMMARY_ENV=(--env "GITHUB_STEP_SUMMARY=${GITHUB_STEP_SUMMARY}")
        fi

        # Tee so the full build/dump/compare/gate log still streams live to the
        # job log, while OUT also captures it (including gate.sh's marker line)
        # for parsing below. PIPESTATUS[0] is docker's exit code, not tee's.
        set -o pipefail
        OUT="$(mktemp)"
        docker run --rm \
          -v "${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}" \
          -v "${GITHUB_ACTION_PATH}:/opt/check-abi:ro" \
          "${SUMMARY_MOUNT[@]}" \
          --env "GITHUB_WORKSPACE=${GITHUB_WORKSPACE}" \
          --env "GITHUB_BASE_REF=${GITHUB_BASE_REF:-}" \
          --env "ABI_BASE_REF=${ABI_BASE_REF:-}" \
          --env "GITHUB_RUN_ID=${GITHUB_RUN_ID:-}" \
          --env "GITHUB_RUN_NUMBER=${GITHUB_RUN_NUMBER:-}" \
          --env "ABI_LIB_NAME=${LIB_NAME}" \
          --env "BUILDER_VERSION=${BUILDER_VERSION}" \
          --env "BUILDER_SOURCE=${BUILDER_SOURCE}" \
          --env "BUILDER_HOST=${BUILDER_HOST}" \
          "${SUMMARY_ENV[@]}" \
          --entrypoint bash \
          "${ABI_DOCKER_IMAGE}" \
          /opt/check-abi/scripts/abi_check.sh | tee "$OUT"
        RC="${PIPESTATUS[0]}"

        LABEL="$(grep -o 'ABI_LABEL_RESULT::[a-zA-Z0-9_-]*' "$OUT" | tail -n1 | cut -d: -f3)"
        rm -f "$OUT"
        if [[ -n "$LABEL" ]]; then
          echo "label=${LABEL}" >> "$GITHUB_OUTPUT"
        fi
        exit "$RC"

    - name: Label PR
      # Runs only on pull_request events (needs a PR number) and only if the gate
      # produced a verdict. Adds the applicable label (patch|minor|needs-review)
      # and removes the other two so a re-run flips the label cleanly. Requires
      # pull-requests: write; on fork PRs the token is read-only and this is a
      # no-op (labels are then informational via the job summary only).
      if: ${{ github.event_name == 'pull_request' && inputs.base-ref == '' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
        PATCH_LABEL: ${{ inputs.patch-label }}
        MINOR_LABEL: ${{ inputs.minor-label }}
        NEEDS_REVIEW_LABEL: ${{ inputs.needs-review-label }}
        LABEL: ${{ steps.run_check.outputs.label }}
      run: |
        if [[ -z "${LABEL:-}" ]]; then
          echo "No ABI verdict was produced; skipping labeling."
          exit 0
        fi
        # gate.sh (running inside the container, with no access to the
        # patch-label/minor-label/needs-review-label inputs) always emits one
        # of the fixed semantic tokens "patch"/"minor"/"needs-review" -- it's
        # the ABI/API verdict, not the configured label text. Translate that
        # token to the actual configured label name here, on the host, where
        # the inputs live.
        ALL_LABELS=("$PATCH_LABEL" "$MINOR_LABEL" "$NEEDS_REVIEW_LABEL")
        case "$LABEL" in
          patch) LABEL="$PATCH_LABEL" ;;
          minor) LABEL="$MINOR_LABEL" ;;
          needs-review) LABEL="$NEEDS_REVIEW_LABEL" ;;
          *) echo "Unexpected ABI verdict token '$LABEL'; skipping."; exit 0 ;;
        esac
        echo "Applying label '$LABEL' on PR #${PR_NUMBER}"
        # gh pr edit --add-label fails if the label does not exist in the repo
        # (it will not create it), so ensure all three labels exist first.
        # --force makes create idempotent; ignore the failure when it exists.
        gh label create "$PATCH_LABEL" --repo "$REPO" --color 0e8a16 \
          --description "ABI backward-compatible (patch release)" --force 2>/dev/null || true
        gh label create "$MINOR_LABEL" --repo "$REPO" --color fbca04 \
          --description "ABI changed, source-compatible (minor release)" --force 2>/dev/null || true
        # Bright red: source/API compatibility is broken -- callers fail to
        # recompile. This is deliberately the most visually alarming of the
        # three; a reviewer must look before deciding whether a minor bump
        # (or a revert) is the right call.
        gh label create "$NEEDS_REVIEW_LABEL" --repo "$REPO" --color d93f0b \
          --description "ABI check: source/API compatibility broken, needs manual review" --force 2>/dev/null || true
        gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "$LABEL" \
          || echo "WARNING: could not add label '$LABEL' (token may be read-only on fork PRs)."
        # Remove the other two labels if present; ignore failure when absent.
        for other in "${ALL_LABELS[@]}"; do
          [[ "$other" == "$LABEL" ]] && continue
          gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "$other" 2>/dev/null || true
        done
