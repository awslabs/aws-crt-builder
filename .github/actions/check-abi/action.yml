name: 'Check ABI Compliance'
description: 'Dump and compare the ABI of a C shared library between the PR head and its base ref, and label the PR patch/minor'

inputs:
  lib-name:
    description: 'Library name (e.g. aws-c-s3). Determines the .so filename (libaws-c-s3.so).'
    required: true
  builder-version:
    description: 'Builder version/channel used to build the library and its dependencies. Also the tag of the ABI docker image.'
    required: false
    default: 'v0.9.93'
  builder-source:
    description: 'Builder artifact source prefix (releases for tagged versions, channels for branch builds).'
    required: false
    default: 'releases'
  builder-host:
    description: 'Builder artifact host URL.'
    required: false
    default: 'https://d19elf31gohf1l.cloudfront.net'
  image-registry:
    description: 'ECR registry hosting the aws-crt-ubuntu-22-abi-x64 image.'
    required: false
    default: '123124136734.dkr.ecr.us-east-1.amazonaws.com'
  image-name:
    description: 'ABI docker image name (baked with the libabigail toolchain).'
    required: false
    default: 'aws-crt-ubuntu-22-abi-x64'
  github-token:
    description: 'Token used to label the PR. Needs pull-requests: write. Defaults to the job token.'
    required: false
    default: ${{ github.token }}
  patch-label:
    description: 'Label applied when the ABI is backward-compatible.'
    required: false
    default: 'patch'
  minor-label:
    description: 'Label applied when the ABI changed (an incompatible but valid, semver-minor, change).'
    required: false
    default: 'minor'

runs:
  using: 'composite'
  steps:
    # The ABI toolchain (libabigail's abidw/abidiff, cmake) is baked into the
    # aws-crt-ubuntu-22-abi-x64 image, so there is no per-run apt-get install
    # here. The consumer job must have configured AWS creds with ECR pull
    # access (aws-actions/configure-aws-credentials) and checked out with
    # fetch-depth: 0 before invoking this action.
    - name: Pull ABI image
      shell: bash
      env:
        IMAGE_REGISTRY: ${{ inputs.image-registry }}
        IMAGE_NAME: ${{ inputs.image-name }}
        BUILDER_VERSION: ${{ inputs.builder-version }}
      run: |
        aws ecr get-login-password | docker login "$IMAGE_REGISTRY" -u AWS --password-stdin
        DOCKER_IMAGE="${IMAGE_REGISTRY}/${IMAGE_NAME}:${BUILDER_VERSION}"
        docker pull "$DOCKER_IMAGE"
        printf 'ABI_DOCKER_IMAGE=%s\n' "$DOCKER_IMAGE" >> "$GITHUB_ENV"

    - name: Run ABI check in container
      # The container runs build -> dump -> compare -> report -> gate as one
      # process (they chain state through an in-container GITHUB_ENV). abidiff's
      # exit code is a bitmask; the gate exits non-zero ONLY when the tool/usage
      # error bits are set (no trustworthy verdict). A compatible or
      # incompatible ABI both succeed here and are surfaced as a PR label by
      # the next step. The chosen label is written to a host-mounted file so it
      # escapes the container.
      shell: bash
      env:
        # printf/env-block (not raw template interpolation) prevents shell and
        # newline injection through the lib-name input.
        LIB_NAME: ${{ inputs.lib-name }}
        BUILDER_VERSION: ${{ inputs.builder-version }}
        BUILDER_SOURCE: ${{ inputs.builder-source }}
        BUILDER_HOST: ${{ inputs.builder-host }}
      run: |
        # The label the container computes is read back by the labeling step.
        # mktemp defaults to mode 600 owned by the runner's UID; the container
        # runs as a different (often root, but not always) UID, so without
        # opening up permissions here the container's write silently fails --
        # gate.sh has no -e and doesn't check the write, so it looks like the
        # check passed while no verdict ever escapes the container.
        ABI_LABEL_FILE="$(mktemp)"
        chmod 666 "$ABI_LABEL_FILE"
        printf 'ABI_LABEL_FILE=%s\n' "$ABI_LABEL_FILE" >> "$GITHUB_ENV"

        # Mount the checkout at the same path so GITHUB_WORKSPACE resolves inside
        # the container, and mount the step-summary file so report.py can append
        # the verdict to the host job summary.
        SUMMARY_MOUNT=()
        SUMMARY_ENV=()
        if [[ -n "${GITHUB_STEP_SUMMARY:-}" ]]; then
          SUMMARY_MOUNT=(-v "${GITHUB_STEP_SUMMARY}:${GITHUB_STEP_SUMMARY}")
          SUMMARY_ENV=(--env "GITHUB_STEP_SUMMARY=${GITHUB_STEP_SUMMARY}")
        fi
        docker run --rm \
          -v "${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}" \
          -v "${GITHUB_ACTION_PATH}:/opt/check-abi" \
          -v "${ABI_LABEL_FILE}:${ABI_LABEL_FILE}" \
          "${SUMMARY_MOUNT[@]}" \
          --env "GITHUB_WORKSPACE=${GITHUB_WORKSPACE}" \
          --env "GITHUB_BASE_REF=${GITHUB_BASE_REF:-}" \
          --env "GITHUB_RUN_ID=${GITHUB_RUN_ID:-}" \
          --env "GITHUB_RUN_NUMBER=${GITHUB_RUN_NUMBER:-}" \
          --env "ABI_LIB_NAME=${LIB_NAME}" \
          --env "ABI_LABEL_FILE=${ABI_LABEL_FILE}" \
          --env "BUILDER_VERSION=${BUILDER_VERSION}" \
          --env "BUILDER_SOURCE=${BUILDER_SOURCE}" \
          --env "BUILDER_HOST=${BUILDER_HOST}" \
          "${SUMMARY_ENV[@]}" \
          --entrypoint bash \
          "${ABI_DOCKER_IMAGE}" \
          /opt/check-abi/scripts/abi_check.sh

    - name: Label PR
      # Runs only on pull_request events (needs a PR number) and only if the gate
      # produced a verdict. Adds the semver label (patch|minor) and removes the
      # other so a re-run flips the label cleanly. Requires pull-requests: write;
      # on fork PRs the token is read-only and this is a no-op (labels are then
      # informational via the job summary only).
      if: ${{ github.event_name == 'pull_request' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
        PATCH_LABEL: ${{ inputs.patch-label }}
        MINOR_LABEL: ${{ inputs.minor-label }}
      run: |
        if [[ -z "${ABI_LABEL_FILE:-}" || ! -s "$ABI_LABEL_FILE" ]]; then
          echo "No ABI verdict was produced; skipping labeling."
          exit 0
        fi
        LABEL="$(tr -d '[:space:]' < "$ABI_LABEL_FILE")"
        case "$LABEL" in
          "$PATCH_LABEL") REMOVE="$MINOR_LABEL" ;;
          "$MINOR_LABEL") REMOVE="$PATCH_LABEL" ;;
          *) echo "Unexpected ABI label '$LABEL'; skipping."; exit 0 ;;
        esac
        echo "Applying label '$LABEL' (removing '$REMOVE') on PR #${PR_NUMBER}"
        # gh pr edit --add-label fails if the label does not exist in the repo
        # (it will not create it), so ensure both labels exist first. --force
        # makes create idempotent; ignore the failure when it already exists.
        gh label create "$PATCH_LABEL" --repo "$REPO" --color 0e8a16 \
          --description "ABI backward-compatible (patch release)" --force 2>/dev/null || true
        gh label create "$MINOR_LABEL" --repo "$REPO" --color fbca04 \
          --description "ABI changed (minor release)" --force 2>/dev/null || true
        gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "$LABEL" \
          || echo "WARNING: could not add label '$LABEL' (token may be read-only on fork PRs)."
        # Remove the opposite label if present; ignore failure when it isn't.
        gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "$REMOVE" 2>/dev/null || true
